services:
  - type: web
    name: akopharmah-pos-sync
    runtime: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: akopharmah-pos-db
          property: connectionString
      - key: AKOPHARMAH_DATA_FILE
        value: /var/data/akopharmah-sync.json
      - key: AKOPHARMAH_BOOTSTRAP_USERNAME
        value: director
      - key: AKOPHARMAH_BOOTSTRAP_PASSWORD
        sync: false
    disk:
      name: akopharmah-data
      mountPath: /var/data
      sizeGB: 1

databases:
  - name: akopharmah-pos-db
    plan: basic-256mb
    databaseName: akopharmah_pos
    user: akopharmah_pos
    ipAllowList: []
